version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: always

  server:
    image: vansh4117v/url-shortener-server:${IMAGE_TAG}
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - redis
    restart: always

  client-build:
    image: vansh4117v/url-shortener-client:${IMAGE_TAG}
    volumes:
      - client-build:/usr/share/nginx/html

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - client-build:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - server
      - client-build
    restart: always

volumes:
  redis-data:
  client-build: