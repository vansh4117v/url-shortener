name: CI-CD

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: |
          cd server
          npm install

      - name: Run Backend Tests
        run: |
          cd server
          npm test

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 1. Build & Push
      - name: Build and Push Server Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-server:${{ github.sha }} ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-server:${{ github.sha }}

      - name: Build and Push Client Image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="/api" \
            --build-arg VITE_BASE_URL="https://clixly.vnsh.tech" \
            --build-arg VITE_SITE_NAME="Clixly" \
            -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-client:${{ github.sha }} ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-client:${{ github.sha }}

      # 2. Create the .env locally on the Runner with a safe filename
      - name: Create server .env file
        run: |
          cat <<EOF > .env.server
          NODE_ENV=production
          PORT=5000
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          SITE_NAME=Clixly
          EOF

      # 3. Transfer Config Files via SCP
      # Using .env.server prevents the action from overriding port 22
      - name: Copy Config Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml,nginx.conf,.env.server"
          target: "url-shortener/"
          rm: false 

      # We need to move the file into the server folder and rename it back to .env
      - name: Move .env to server folder
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            mkdir -p url-shortener/server
            mv url-shortener/.env.server url-shortener/server/.env
            chmod 600 url-shortener/server/.env

      # 4. Final Deploy
      - name: Deploy with Health Check
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd url-shortener

            export IMAGE_TAG=${{ github.sha }}

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans

            echo "Waiting for app to start..."
            sleep 5

            for i in {1..10}; do
              if curl -f http://localhost:5000/health; then
                echo "Deployment successful"

                # CLEANUP
                docker image prune -f

                exit 0
              fi
              echo "Retrying health check..."
              sleep 3
            done

            echo "Deployment failed"
            exit 1